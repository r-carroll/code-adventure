id: 2
xp: 100
title:
  en: "The Fortune Teller"
  ja: "運命の占い師"
story:
  en: "Your game knows your hero's name now — but a name alone can't reveal a destiny. Every true fortune needs a number. Ask your hero how many years they've walked this world, and ancient math will reveal the exact 4-digit year they become a 100-year-old legend. Beware, though: the computer sees everything the player types as *text*, even numbers. That `12` the player types is really the letters \"12\". You'll have to turn that text into a real number before the magic will work."
  ja: "ゲームはもうヒーローの名前を知っています——でも、名前だけでは運命はわかりません。本物の占いには「数字」が必要です。ヒーローがこの世界を何年歩いてきたのか（年齢）をたずねて、古（いにしえ）の計算で、その人が伝説の100歳になる西暦（4桁の数字）をぴたりと言い当てましょう。でも注意：コンピューターは、プレイヤーが入力したものを、たとえ数字でもぜんぶ「文字」として見ています。プレイヤーが入力した `12` は、じつは \"12\" という文字なのです。魔法を働かせるには、その文字を本物の数字に変えてあげる必要があります。"
task:
  en:
    - "Use `gets` and `.to_i` to ask the player's age and convert it into a number."
    - "Calculate and print the 4-digit year the player will turn 100 years old."
  ja:
    - "`gets` と `.to_i` を使って、プレイヤーに年齢を入力してもらい、数字に変換しましょう。"
    - "そのプレイヤーが100歳になる西暦（4桁の数字）を計算して表示しましょう。"
concepts:
  en: "The star of this level is the difference between a String (text) and an Integer (a whole number). Ruby reads everything from `gets` as a String, even if it looks like a number — so `12` typed by the player is really the text \"12\". You can't do math on text! `.to_i` (\"to integer\") is the spell that converts that text into a real number you can add and subtract.\n\nDeep dive: once age is a real number, the math is `100 - age` (years left until they turn 100), added to the current year (like `2026`). Try printing `age` before and after `.to_i`, and ask your tutor what happens if you try to do `100 - age` while age is still a String!"
  ja: "このレベルの主役は、String（文字列＝文字）と Integer（整数＝数字）のちがいです。Rubyは `gets` で受け取ったものを、たとえ数字に見えても、ぜんぶ String として読みます——だからプレイヤーが入力した `12` は、じつは \"12\" という文字にすぎません。文字では計算ができないのです！ `.to_i`（to integer = 整数に変換）は、その文字を、足したり引いたりできる本物の数字に変える呪文です。\n\nもっと詳しく：年齢が本物の数字になれば、計算は `100 - age`（100歳になるまでの残りの年数）を、今の西暦（たとえば `2026`）に足すだけです。`.to_i` の前と後で `age` を表示して比べてみよう。そして、age がまだ String のまま `100 - age` をしたらどうなるか、AI先生に聞いてみよう！"
power_prompts:
  en:
    - "Can you explain how `.to_i` turns text into a number, and what happens if I forget to use it?"
    - "Why does Ruby treat the age the player types as text instead of a number?"
    - "How do I calculate the year someone turns 100 using their age and the current year?"
  ja:
    - "`.to_i` が文字を数字に変える仕組みを教えて。使い忘れたらどうなるの？"
    - "プレイヤーが入力した年齢が、なぜ数字ではなく文字としてあつかわれるの？"
    - "年齢と今の西暦を使って、その人が100歳になる年を計算するにはどうすればいい？"
checks:
  - type: file_exists
    hint:
      en: "I can't find adventure.rb yet, or it's empty. It should already have your Level 1 code in it — open it in your editor and keep building!"
      ja: "adventure.rb がまだ見つからないか、中身が空っぽみたいです。レベル1のコードが入っているはずです。エディタで開いて、続きを作っていこう！"
  - type: source
    pattern: 'to_i'
    hint:
      en: "I couldn't find `.to_i` anywhere. You'll need it to turn the age the player types (which is text!) into a real number so you can do math with it. Ask your AI tutor about `.to_i`!"
      ja: "`.to_i` が見つかりませんでした。プレイヤーが入力した年齢はただの文字なので、計算するには数字に変換する必要があります。AI先生に `.to_i` について聞いてみよう！"
  - type: run
    stdin: "Hero\n12\n"
    expect: ['\d{4}']
    forbid: ['(NoMethodError|NameError|SyntaxError|TypeError|ArgumentError|RuntimeError|ZeroDivisionError)']
    hint:
      en: "When I ran your game with the name 'Hero' and age 12, I didn't see the 4-digit year Hero turns 100 (or your program crashed). After reading the age with `gets.to_i`, calculate `100 - age`, add it to the current year, and print the result."
      ja: "'Hero' という名前と年齢12でゲームを動かしてみたところ、Heroが100歳になる西暦（4桁の数字）が見つかりませんでした（またはエラーで止まってしまいました）。`gets.to_i` で年齢を読み取ったら、`100 - age` を計算して今の西暦に足し、その結果を表示してみよう。"
