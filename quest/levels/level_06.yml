id: 6
xp: 150
title:
  en: "The Hero's Backpack"
  ja: "勇者のバックパック"
story:
  en: "Every hero collects things along the way — potions, swords, strange trinkets picked up in the dark. Your game needs a backpack: a list that can grow as the player finds new items. Create an inventory, let your hero pick things up, and give them a way to look inside."
  ja: "どんなヒーローも、旅の途中でいろいろな物を集めていきます——ポーション、剣、暗闇で拾った不思議な品々。君のゲームにも「バックパック」、つまり見つけたアイテムが増えていくリストが必要です。持ち物リスト（インベントリ）を作り、ヒーローがアイテムを手に入れられるようにして、中身を確認できるようにしましょう。"
task:
  en:
    - "Create an inventory Array to hold the player's items (it can start empty)."
    - "Add at least one item to the inventory using `<<` or `.push` somewhere during the game."
    - "Give the player a way to see what's inside the inventory (for example, printing the Array)."
  ja:
    - "プレイヤーの持ち物を入れておくための配列（Array）を作りましょう（最初は空っぽでOK）。"
    - "ゲームの中で `<<` または `.push` を使って、少なくとも1つアイテムをインベントリに追加しましょう。"
    - "プレイヤーが持ち物の中身を確認できるようにしましょう（例えば配列を表示するなど）。"
concepts:
  en: "Look for `inventory = []` (creates an empty list) and `<<` or `.push` (adds something to the end of the list).\n\nDeep dive: Ruby (like most programming languages) counts positions starting at 0 — so the first item in your array is at index 0, the second at index 1. Ask your AI tutor why programmers start counting at zero! Arrays also come with built-in skills: you can `.sort` them, `.reverse` them, even `.shuffle` them, and `inventory.include?('Sword')` checks whether something is already in the list."
  ja: "注目ポイントは `inventory = []`（空っぽのリストを作る）と、`<<` または `.push`（リストの最後に何かを追加する）です。\n\nもっと詳しく：Ruby（そしてほとんどのプログラミング言語）は、位置を **0** から数え始めます。つまり配列の1番目は0番目、2番目は1番目になります。なぜ0から数え始めるのか、AI先生に聞いてみよう！配列には便利な「組み込みの技」もあります。`.sort`（並べ替え）、`.reverse`（逆順）、`.shuffle`（シャッフル）などが使えます。また `inventory.include?('剣')` を使えば、リストの中にすでにあるかどうか確認できます。"
power_prompts:
  en:
    - "How do I create an Array in Ruby to hold inventory items like 'Sword' and 'Potion'?"
    - "Can you show me how to `push` a new item into a list, and how to check how many items are in it?"
    - "How would I remove an item from the inventory if the player uses it, like a potion?"
  ja:
    - "'剣' や 'ポーション' のようなアイテムを入れる配列（Array）をRubyで作る方法を教えて。"
    - "新しいアイテムをリストに `push` する方法と、リストの中に何個アイテムがあるか数える方法を教えて。"
    - "プレイヤーがポーションを使ったときに、インベントリからアイテムを削除する方法を教えて。"
checks:
  - type: source
    pattern: '=\s*\['
    hint:
      en: "I couldn't find an Array being created (something like `inventory = []`). Ask your AI tutor: 'How do I create an Array to hold my inventory?'"
      ja: "配列を作っている部分（`inventory = []` のような形）が見つかりませんでした。AI先生に聞いてみよう：「持ち物を入れる配列を作るにはどうすればいい？」"
  - type: source
    pattern: '<<|\.push'
    hint:
      en: "I couldn't find `<<` or `.push` — you need one of these to actually add items to your inventory. Ask your AI tutor how to add things to an Array!"
      ja: "`<<` や `.push` が見つかりませんでした。インベントリにアイテムを追加するには、どちらかが必要です。AI先生に配列へアイテムを追加する方法を聞いてみよう！"
  - type: run
    stdin: "Hero\n12\n1\nquit\n"
    expect: []
    forbid: ['(NoMethodError|NameError|SyntaxError|TypeError|ArgumentError|RuntimeError|ZeroDivisionError)']
    hint:
      en: "I played through your game and it crashed. Double check your Array syntax — brackets, commas, and quotes all matter!"
      ja: "ゲームを動かしてみたらエラーが出てしまいました。配列の書き方——かっこ、カンマ、クォーテーションなど——をもう一度確認してみよう！"
