id: 9
xp: 250
title:
  en: "Saving the Story"
  ja: "物語を保存する"
story:
  en: "Every great story deserves a bookmark. What happens when your player needs to stop for dinner and come back tomorrow? Without saving, all their progress vanishes the moment the game closes. Give your hero a way to leave a mark on the world that lasts even after the terminal closes: typing `save` should write their progress to a file."
  ja: "どんな素晴らしい物語にも、しおりが必要です。もしプレイヤーが夕食のために中断して、明日また続きをやりたくなったらどうしましょう？ 保存（セーブ）の仕組みがなければ、ゲームを閉じた瞬間にすべての進み具合が消えてしまいます。ターミナルを閉じたあとも残る、世界に足跡を残す方法をヒーローに与えましょう——`save` と入力したら、進み具合をファイルに書き込むようにします。"
task:
  en:
    - "Let the player type `save` at some point during the game."
    - "When they do, write something about their progress (like their name, HP, or inventory) to a file using `File.write` or `File.open`."
  ja:
    - "ゲームの途中で、プレイヤーが `save` と入力できるようにしましょう。"
    - "`save` と入力されたら、`File.write` または `File.open` を使って、進み具合（名前、HP、持ち物など）をファイルに書き込みましょう。"
concepts:
  en: "Look for `File.write('save.txt', data)`, which creates a file (or overwrites one) and puts data inside it, and a check for the word `save` being typed by the player somewhere in your code.\n\nDeep dive: 'Persistence' is a big word that just means data sticking around even after the program (or the power) turns off. Files are the most basic way to achieve it. Ask your AI tutor what happens if `save.txt` doesn't exist yet when you try to read it — and how `File.exist?` can protect your game from crashing!"
  ja: "注目ポイントは `File.write('save.txt', data)`（ファイルを作って——または上書きして——中にデータを書き込む）と、プレイヤーが `save` と入力したかどうかをコードのどこかで確認している部分です。\n\nもっと詳しく：「永続性（えいぞくせい / Persistence）」という難しい言葉は、プログラム（や電源）が止まってもデータが残ることを意味します。ファイルは、それを実現する一番基本的な方法です。もし `save.txt` がまだ存在しないときに読み込もうとしたらどうなるか、`File.exist?` を使ってゲームが止まらないようにする方法を、AI先生に聞いてみよう！"
power_prompts:
  en:
    - "How can I save the player's name and HP to a text file called save.txt when they type 'save'?"
    - "How do I read that file back when the game starts, so the player can continue where they left off?"
    - "What happens if save.txt doesn't exist yet, and how does File.exist? help?"
  ja:
    - "プレイヤーが 'save' と入力したときに、名前とHPを save.txt というテキストファイルに保存する方法を教えて。"
    - "ゲームが始まるときにそのファイルを読み込んで、続きから遊べるようにする方法を教えて。"
    - "もし save.txt がまだ存在しなかったらどうなるの？ File.exist? はどう役に立つの？"
checks:
  - type: source
    pattern: 'File\.(write|open)'
    hint:
      en: "I couldn't find `File.write` or `File.open` anywhere. You need one of these to actually save data to a file. Ask your AI tutor: 'How do I write data to a file in Ruby?'"
      ja: "`File.write` や `File.open` が見つかりませんでした。データをファイルに保存するには、どちらかが必要です。AI先生に聞いてみよう：「Rubyでファイルにデータを書き込むにはどうすればいい？」"
  - type: source
    pattern: 'save'
    hint:
      en: "I couldn't find the word 'save' being checked anywhere in your code. The player needs to be able to type 'save' to trigger the file write. Ask your AI tutor how to detect a specific typed command!"
      ja: "コードの中に 'save' という単語をチェックしている部分が見つかりませんでした。プレイヤーが 'save' と入力したら、ファイルへの書き込みが始まるようにする必要があります。AI先生に、特定の入力コマンドを検知する方法を聞いてみよう！"
  - type: run
    stdin: "Hero\n12\nsave\nquit\n"
    expect: []
    forbid: ['(NoMethodError|NameError|SyntaxError|TypeError|ArgumentError|RuntimeError|ZeroDivisionError)']
    hint:
      en: "I played 'Hero', age 12, typed 'save', then 'quit' — and something crashed. Make sure typing 'save' doesn't break your main loop, and that File.write has valid arguments."
      ja: "'Hero'、年齢12で、'save' と入力してから 'quit' でプレイしてみたところ、エラーが出ました。'save' と入力してもメインループが壊れないか、`File.write` の引数が正しいか確認してみよう。"
