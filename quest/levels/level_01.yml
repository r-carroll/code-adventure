id: 1
xp: 100
title:
  en: "The Magic Echo"
  ja: "魔法のやまびこ"
story:
  en: "Your quest begins in total silence. No name, no voice, nothing — just a blank file waiting to become a world. Before your hero can do anything, your game needs to find its voice and greet the player. Speak the first words into the void, then ask the player who they are — and echo their name back so they know this world is truly theirs."
  ja: "君の冒険は、まだ何もない静けさの中から始まります。名前も声も、何もありません——ただの空っぽのファイルが、これから一つの世界に生まれ変わろうとしています。ヒーローが動き出す前に、まずはゲームが声を見つけて、プレイヤーを出迎えなければなりません。最初の言葉を静けさの中に響かせて、プレイヤーに名前をたずね、その名前を呼び返してあげましょう——この世界が本当に自分のものだと感じられるように。"
task:
  en:
    - "Use `puts` to print an opening message and bring your world to life."
    - "Use `gets` (with `.chomp`) to ask the player their name, and store it in a variable."
    - "Print a greeting that includes the player's name inside the sentence."
  ja:
    - "`puts` を使って、最初のメッセージを表示し、あなたの世界に命をふきこみましょう。"
    - "`gets`（と `.chomp`）を使って、プレイヤーに名前を入力してもらい、変数に保存しましょう。"
    - "プレイヤーの名前を文の中に入れた挨拶（あいさつ）を表示しましょう。"
concepts:
  en: "Look for `puts` (prints text to the screen), `gets` (waits for the player to type, usually paired with `.chomp` to remove the Enter key press), and `#{...}` (string interpolation — a way to drop a variable's value right inside a sentence).\n\nDeep dive: think of a variable like `name` as a small labeled box where the computer stores information. When you write `name = gets.chomp`, you're telling the player 'type something', catching what they type, trimming off the invisible Enter key, and tucking it into the box named `name`. Later, `#{name}` reaches into that box and drops the value right into your sentence. Try printing the same greeting with `+` instead of `#{}` and see which one feels easier to read!"
  ja: "注目ポイントは `puts`（画面に文字を表示する）、`gets`（プレイヤーが入力するのを待つ命令。Enterキーの改行を消すために `.chomp` とセットで使うことが多い）、そして `#{...}`（文字列補間、文章の中に変数の値をそのまま入れ込む魔法の枠）です。\n\nもっと詳しく：`name` のような変数は、コンピューターが情報をしまっておく「小さな名札つきの箱」だと考えてください。`name = gets.chomp` と書くと、プレイヤーに「何か入力して」とお願いし、入力されたものを受け取り、見えないEnterキーの改行を切り落とし、`name` という名前の箱にしまう、という意味になります。あとで `#{name}` と書くと、その箱の中身を取り出して文の中にそのまま入れてくれます。同じ挨拶を `#{}` の代わりに `+` を使って表示してみて、どちらが読みやすいか比べてみよう！"
power_prompts:
  en:
    - "How do I use `gets` to read what the player types, and why do people add `.chomp` after it?"
    - "What is a variable, and how do I store the player's name in one?"
    - "How does `#{}` let me put a variable inside a sentence I print with `puts`?"
  ja:
    - "`gets` を使ってプレイヤーの入力を読み取る方法を教えて。あと、なぜみんな `.chomp` を後ろにつけるの？"
    - "変数って何？ プレイヤーの名前を変数に保存するにはどうすればいい？"
    - "`puts` で文章を表示するとき、`#{}` を使って変数を文の中に入れる方法を教えて。"
checks:
  - type: file_exists
    hint:
      en: "I can't find adventure.rb yet, or it's empty. Open it in your editor and write your first `puts` line to bring your world to life!"
      ja: "adventure.rb がまだ見つからないか、中身が空っぽみたいです。エディタで開いて、まずは `puts` で何か表示するところから始めてみよう！"
  - type: source
    pattern: 'gets'
    hint:
      en: "I couldn't find `gets` in your code. That's the command that pauses your game and waits for the player to type something. Ask your AI tutor: 'How do I use gets to read player input?'"
      ja: "コードの中に `gets` が見つかりませんでした。これはプレイヤーが何か入力するのを待つための命令です。AI先生に聞いてみよう：「gets を使ってプレイヤーの入力を読み取るにはどうすればいい？」"
  - type: run
    stdin: "Hero\n"
    expect: ['Hero']
    forbid: ['(NoMethodError|NameError|SyntaxError|TypeError|ArgumentError|RuntimeError|ZeroDivisionError)']
    hint:
      en: "When I ran your game and typed the name 'Hero', I didn't see the name printed back (or your program crashed). Make sure you read the player's name with `gets.chomp`, store it in a variable, and then print a greeting that includes that variable."
      ja: "ゲームを動かして 'Hero' という名前を入力してみたところ、名前が表示されませんでした（またはエラーで止まってしまいました）。`gets.chomp` でプレイヤーの名前を読み取り、変数に保存して、その変数を含めた挨拶を表示してみよう。"
